name: Build & Release Aether Android

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  APP_VERSION: 1.0.0  # Update this as you release new versions

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug' || github.ref_type != 'tag'
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        if: github.event.inputs.build_type == 'debug' || github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: Aether-Android-Debug
          path: app/build/outputs/apk/debug/*.apk

      # Build Release APK (unsigned) when triggered by a tag
      - name: Build Release APK
        if: github.ref_type == 'tag'
        run: ./gradlew assembleRelease

      - name: Sign Release APK
        if: github.ref_type == 'tag' && secrets.SIGNING_KEY != ''
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK artifact
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: Aether-Android-Release-unsigned
          path: app/build/outputs/apk/release/*.apk

      # Create GitHub Release when a tag is pushed
      - name: Create Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Aether Android ${{ github.ref_name }}"
          body: |
            ## Aether Android ${{ github.ref_name }}
            
            ### Installation
            1. Download the APK below
            2. Enable "Install from unknown sources" in your Android settings
            3. Open the APK file to install
            
            ### What's Changed
            Check the commit history for details.
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}