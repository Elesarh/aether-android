name: Build & Release Aether Android

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  APP_VERSION: 1.0.0

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      # Always build debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Aether-Android-Debug
          path: app/build/outputs/apk/debug/*.apk

      # Build and sign release APK only for tags
      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleRelease

      - name: Sign Release APK
        if: startsWith(github.ref, 'refs/tags/') && secrets.SIGNING_KEY != ''
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Aether Android ${{ github.ref_name }}"
          body: |
            ## Aether Android ${{ github.ref_name }}
            
            ### 📱 Installation
            1. Download the APK below
            2. Enable "Install from unknown sources" in Settings
            3. Open the APK file and install
            
            ### ✨ Features
            - MASQUE (HTTP/3 & HTTP/2) protocol support
            - WireGuard support
            - Auto-connect to last known gateway
            - SOCKS5 proxy on 127.0.0.1:1819
            - Background foreground service
            - Built-in update checker
            
            ### 🔧 Usage
            Press "Start Aether" to begin the tunnel.
            Configure your apps to use SOCKS5 proxy at 127.0.0.1:1819
          files: |
            app/build/outputs/apk/release/*.apk
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}